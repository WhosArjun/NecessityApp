<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sonder — Weather &amp; Navigate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --sky-1:#7EC8FF; --sky-2:#B9E3FF; --sky-3:#EAF6FF;
    --text:#1B1F2A; --text-dim:rgba(27,31,42,.62);
    --glass:rgba(255,255,255,.45); --glass-border:rgba(255,255,255,.7); --glass-strong:rgba(255,255,255,.62);
    --scrim: rgba(0,0,0,0);
    --radius-lg:28px; --radius-md:20px; --radius-sm:14px;
    --font-display:'Fraunces', serif; --font-body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:var(--font-body); color:var(--text);
    background:#0b0c10;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden;
  }
  button, input{font-family:inherit;}
  button{cursor:pointer;}

  .stage{position:relative; width:430px; height:900px; max-height:96vh; display:flex; align-items:center; justify-content:center;}
  .glow{
    position:absolute; inset:-60px; border-radius:60px; filter:blur(60px); opacity:.55; z-index:0;
    background:linear-gradient(165deg, var(--sky-1), var(--sky-2) 55%, var(--sky-3));
    transition:background 1.4s ease;
  }
  .phone{
    position:relative; z-index:1; width:100%; height:100%;
    border-radius:44px; overflow:hidden;
    box-shadow:0 40px 90px rgba(0,0,0,.45), 0 0 0 8px #101114, 0 0 0 9px rgba(255,255,255,.06);
    background:#000;
  }
  .sky{
    position:absolute; inset:0;
    background:linear-gradient(165deg, var(--sky-1), var(--sky-2) 55%, var(--sky-3));
    background-size:140% 140%;
    transition:background 1.4s ease;
    animation:drift 40s ease-in-out infinite alternate;
  }
  .sky::after{
    content:''; position:absolute; inset:0; background:var(--scrim); transition:background 1.4s ease;
  }
  @keyframes drift{ from{background-position:0% 0%;} to{background-position:100% 40%;} }
  .sun{
    position:absolute; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.9), rgba(255,255,255,0) 70%);
    filter:blur(2px); opacity:.65; pointer-events:none; transition:top 1.4s ease, left 1.4s ease, opacity 1.4s ease;
  }

  .view{position:absolute; inset:0; display:none; flex-direction:column; z-index:2;}
  .view.active{display:flex;}

  .statusbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 28px 0; font-size:14px; font-weight:600; letter-spacing:.02em;
  }

  /* ---------- HOME ---------- */
  #view-home .home-content{flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:0 28px 40px;}
  .eyebrow{font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dim); margin:0 0 10px;}
  .home-title{font-family:var(--font-display); font-weight:420; font-size:52px; line-height:1.04; margin:0 0 12px; letter-spacing:-.01em;}
  .home-sub{margin:0 0 28px; font-size:15px; color:var(--text-dim); max-width:280px;}
  .card-stack{display:flex; flex-direction:column; gap:12px;}
  .app-card{
    display:flex; align-items:center; gap:16px; text-align:left;
    padding:18px 18px; border-radius:var(--radius-lg);
    background:var(--glass); border:1px solid var(--glass-border);
    backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%);
    color:var(--text); transition:transform .18s ease, background .18s ease;
  }
  .app-card:hover{transform:translateY(-2px);}
  .app-card:active{transform:scale(.98);}
  .app-card:focus-visible{outline:2px solid var(--text); outline-offset:3px;}
  .card-icon{
    width:48px; height:48px; border-radius:16px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    background:var(--glass-strong); border:1px solid var(--glass-border);
  }
  .card-icon svg{width:26px; height:26px;}
  .card-text{flex:1; display:flex; flex-direction:column; gap:2px;}
  .card-label{font-family:var(--font-display); font-size:20px; font-weight:500;}
  .card-desc{font-size:13px; color:var(--text-dim);}
  .chevron{font-size:18px; color:var(--text-dim); transition:transform .18s ease;}
  .app-card:hover .chevron{transform:translateX(3px);}

  /* ---------- SHARED HEADER ---------- */
  .subhead{display:flex; align-items:center; justify-content:space-between; padding:14px 20px 6px;}
  .icon-btn{
    width:40px; height:40px; border-radius:50%; border:1px solid var(--glass-border);
    background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    display:flex; align-items:center; justify-content:center; color:var(--text);
  }
  .icon-btn:focus-visible{outline:2px solid var(--text); outline-offset:2px;}
  .icon-btn svg{width:18px; height:18px;}
  .pill-toggle{
    display:flex; border-radius:999px; overflow:hidden; border:1px solid var(--glass-border);
    background:var(--glass); backdrop-filter:blur(16px);
  }
  .pill-toggle button{
    border:0; background:transparent; padding:8px 14px; font-size:13px; font-weight:700; color:var(--text-dim);
  }
  .pill-toggle button.active{background:var(--glass-strong); color:var(--text);}
  .pill-toggle button:focus-visible{outline:2px solid var(--text); outline-offset:-2px;}

  /* ---------- WEATHER ---------- */
  #view-weather .scroll{flex:1; overflow-y:auto; padding:6px 20px 34px; -webkit-overflow-scrolling:touch;}
  #view-weather .scroll::-webkit-scrollbar{display:none;}
  .loc-name{font-size:15px; font-weight:600; text-align:center; margin:6px 0 0;}
  .loc-date{font-size:12.5px; color:var(--text-dim); text-align:center; margin:2px 0 0;}
  .now-icon{display:flex; justify-content:center; margin:14px 0 0;}
  .now-icon svg{width:74px; height:74px;}
  .now-temp{font-family:var(--font-display); font-size:104px; font-weight:340; text-align:center; line-height:1; margin:2px 0 0; letter-spacing:-.02em;}
  .now-cond{text-align:center; font-size:16px; font-weight:600; margin:2px 0 0;}
  .now-range{text-align:center; font-size:13.5px; color:var(--text-dim); margin:6px 0 0;}

  .glass-card{
    background:var(--glass); border:1px solid var(--glass-border);
    backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-radius:var(--radius-md);
  }
  .section-label{font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin:22px 2px 8px;}

  .hourly-strip{display:flex; gap:6px; overflow-x:auto; padding:14px 10px;}
  .hourly-strip::-webkit-scrollbar{display:none;}
  .hour-item{flex:0 0 auto; width:56px; display:flex; flex-direction:column; align-items:center; gap:8px;}
  .hour-item .h-time{font-size:12px; color:var(--text-dim); font-weight:600;}
  .hour-item svg{width:24px; height:24px;}
  .hour-item .h-temp{font-size:14.5px; font-weight:700;}

  .daily-list{display:flex; flex-direction:column;}
  .day-row{display:flex; align-items:center; gap:12px; padding:11px 16px; border-bottom:1px solid rgba(120,120,140,.14);}
  .day-row:last-child{border-bottom:0;}
  .day-name{width:44px; font-size:14px; font-weight:700;}
  .day-row svg{width:22px; height:22px; flex:0 0 auto;}
  .day-bar-wrap{flex:1; display:flex; align-items:center; gap:8px;}
  .day-lo,.day-hi{font-size:13.5px; font-weight:600; width:30px; text-align:center; color:var(--text-dim);}
  .day-hi{color:var(--text);}
  .day-bar{flex:1; height:4px; border-radius:2px; background:rgba(120,120,140,.2); position:relative; overflow:hidden;}
  .day-bar i{position:absolute; top:0; bottom:0; border-radius:2px; background:linear-gradient(90deg,#8FC7FF,#FFB199);}

  .arc-card{padding:18px 20px 14px; display:flex; flex-direction:column; align-items:center;}
  .arc-times{display:flex; justify-content:space-between; width:100%; font-size:12.5px; color:var(--text-dim); margin-top:2px;}
  .arc-times b{color:var(--text); font-weight:700;}

  .detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;}
  .detail-card{padding:14px 16px; display:flex; flex-direction:column; gap:6px;}
  .detail-top{display:flex; align-items:center; gap:8px; color:var(--text-dim); font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
  .detail-top svg{width:15px; height:15px;}
  .detail-value{font-family:var(--font-display); font-size:26px; font-weight:450;}
  .detail-note{font-size:12px; color:var(--text-dim);}

  .credit{text-align:center; font-size:11px; color:var(--text-dim); margin-top:22px;}

  .center-msg{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:0 40px; text-align:center;}
  .center-msg p{margin:0; color:var(--text-dim); font-size:14px;}
  .center-msg .msg-title{font-family:var(--font-display); font-size:24px; color:var(--text); font-weight:500;}
  .spinner{width:26px; height:26px; border-radius:50%; border:2.5px solid var(--glass-border); border-top-color:var(--text); animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn{
    padding:12px 22px; border-radius:999px; border:1px solid var(--glass-border); background:var(--glass-strong);
    color:var(--text); font-weight:700; font-size:14px;
  }
  .btn:focus-visible{outline:2px solid var(--text); outline-offset:2px;}
  .search-row{display:flex; gap:8px; width:100%; max-width:280px; position:relative;}
  .search-row input{
    flex:1; border-radius:999px; border:1px solid var(--glass-border); background:var(--glass);
    padding:10px 16px; font-size:14px; color:var(--text); outline:none;
  }
  .search-row input::placeholder{color:var(--text-dim);}

  /* ---------- NAV ---------- */
  #view-nav{background:#0b0c10;}
  #map{position:absolute; inset:0; z-index:0;}
  .nav-top{position:absolute; top:0; left:0; right:0; z-index:5; padding:16px 16px 0; display:flex; flex-direction:column; gap:8px;}
  .nav-search{
    display:flex; align-items:center; gap:10px; padding:6px 8px 6px 16px; border-radius:999px;
    background:rgba(255,255,255,.94); border:1px solid rgba(0,0,0,.06); box-shadow:0 8px 24px rgba(0,0,0,.18);
  }
  .nav-search input{flex:1; border:0; outline:none; font-size:15px; background:transparent; padding:8px 0; color:#1B1F2A;}
  .nav-search input::placeholder{color:#8b93a1;}
  .nav-search button{
    width:36px; height:36px; border-radius:50%; border:0; background:#1B1F2A; color:#fff;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .nav-search button svg{width:16px; height:16px;}
  .nav-search .dot{width:8px; height:8px; border-radius:50%; flex:0 0 auto; margin-left:4px;}
  .nav-field{position:relative;}
  .suggest-list{
    position:absolute; left:6px; right:6px; top:calc(100% + 6px); z-index:9;
    background:rgba(255,255,255,.98); border-radius:18px; overflow:hidden;
    box-shadow:0 14px 34px rgba(0,0,0,.24); display:none; max-height:220px; overflow-y:auto;
  }
  .suggest-list.show{display:block;}
  .suggest-item{
    display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid rgba(0,0,0,.06);
    color:#1B1F2A; font-size:14px; text-align:left; width:100%; background:none; border-left:0; border-right:0; border-top:0;
  }
  .suggest-item:last-child{border-bottom:0;}
  .suggest-item:hover, .suggest-item:focus-visible, .suggest-item.hi{background:rgba(59,130,246,.08);}
  .suggest-item svg{width:15px; height:15px; flex:0 0 auto; color:#8b93a1;}
  .suggest-item .s-main{font-weight:600;}
  .suggest-item .s-sub{color:#8b93a1; font-size:12.5px; margin-left:4px;}
  .suggest-empty{padding:14px 16px; font-size:13px; color:#8b93a1;}
  .route-options{display:flex; gap:8px; margin:2px 0 14px; overflow-x:auto;}
  .route-chip{
    flex:0 0 auto; padding:9px 14px; border-radius:14px; border:1.5px solid #E4E7EC; background:#fff;
    font-size:12.5px; font-weight:700; color:#4B5568; text-align:left; line-height:1.3;
  }
  .route-chip span{display:block; font-size:11px; font-weight:600; color:#8b93a1;}
  .route-chip.active{border-color:#3B82F6; background:rgba(59,130,246,.08); color:#1B1F2A;}
  .route-chip.active span{color:#3B82F6;}
  .nav-banner{
    background:rgba(27,31,42,.92); color:#fff; font-size:12.5px; line-height:1.4;
    padding:10px 14px; border-radius:14px; display:none; box-shadow:0 8px 20px rgba(0,0,0,.2);
  }
  .nav-banner.show{display:block;}
  .nav-banner button{
    margin-top:6px; border:0; background:rgba(255,255,255,.16); color:#fff; font-size:12px; font-weight:700;
    padding:6px 12px; border-radius:999px;
  }
  .nav-back{
    position:absolute; top:16px; left:16px; z-index:6; width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.9); border:0; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.2); color:#1B1F2A;
  }
  .nav-back svg{width:18px; height:18px;}
  .locate-btn{
    position:absolute; right:16px; bottom:150px; z-index:6; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.95); border:0; box-shadow:0 8px 20px rgba(0,0,0,.2);
    display:flex; align-items:center; justify-content:center; color:#1B1F2A;
  }
  .locate-btn svg{width:20px; height:20px;}
  .nav-sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:6; transform:translateY(110%);
    transition:transform .32s cubic-bezier(.2,.8,.3,1);
    background:rgba(255,255,255,.96); backdrop-filter:blur(20px);
    border-radius:26px 26px 0 0; padding:16px 22px 26px; box-shadow:0 -10px 40px rgba(0,0,0,.25); color:#1B1F2A;
  }
  .nav-sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; border-radius:2px; background:#d6d9e0; margin:0 auto 14px;}
  .sheet-title{font-family:var(--font-display); font-size:20px; font-weight:500; margin:0 0 4px;}
  .sheet-stats{display:flex; gap:18px; margin:8px 0 16px; font-size:13.5px; color:#6b7280;}
  .sheet-stats b{color:#1B1F2A; font-size:15px;}
  .sheet-actions{display:flex; gap:10px;}
  .sheet-actions button{flex:1; padding:12px; border-radius:14px; border:0; font-weight:700; font-size:14px;}
  .sheet-actions .primary{background:#1B1F2A; color:#fff;}
  .sheet-actions .ghost{background:#F0F1F4; color:#1B1F2A;}
  .nav-status{
    position:absolute; left:16px; bottom:20px; z-index:6; background:rgba(255,255,255,.92);
    padding:8px 14px; border-radius:999px; font-size:12.5px; color:#1B1F2A; box-shadow:0 6px 18px rgba(0,0,0,.15);
    max-width:70%;
  }

  /* ---------- IN-APP TURN-BY-TURN ---------- */
  .tbt-overlay{
    position:absolute; inset:0; z-index:20; background:#F5F6F8; display:none; flex-direction:column; color:#1B1F2A;
  }
  .tbt-overlay.show{display:flex;}
  .tbt-header{
    display:flex; align-items:center; gap:12px; padding:16px 18px 12px; background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.06); flex:0 0 auto;
  }
  .tbt-close{
    width:36px; height:36px; border-radius:50%; border:0; background:#F0F1F4; color:#1B1F2A;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .tbt-close svg{width:16px; height:16px;}
  .tbt-summary{font-size:13.5px; color:#6b7280; font-weight:600;}
  .tbt-summary b{color:#1B1F2A; font-size:15px;}
  .tbt-next{
    margin:16px 18px 10px; background:#1B1F2A; color:#fff; border-radius:24px; padding:18px 20px;
    display:flex; align-items:center; gap:16px; flex:0 0 auto;
  }
  .tbt-next-icon{
    width:46px; height:46px; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.14); border-radius:15px;
  }
  .tbt-next-icon svg{width:26px; height:26px;}
  .tbt-next-dist{font-family:var(--font-display); font-size:23px; font-weight:500; line-height:1.1;}
  .tbt-next-instr{font-size:13.5px; color:rgba(255,255,255,.78); margin-top:3px;}
  .tbt-start-btn{
    margin:2px 18px 12px; padding:14px; border-radius:16px; border:0; background:#3B82F6; color:#fff;
    font-weight:700; font-size:15px; flex:0 0 auto;
  }
  .tbt-start-btn.active{background:#E24A4A;}
  .tbt-steps{flex:1; overflow-y:auto; padding:4px 12px 30px;}
  .tbt-step{display:flex; align-items:center; gap:14px; padding:13px 8px; border-bottom:1px solid #E9EBEF;}
  .tbt-step.active{background:rgba(59,130,246,.08); border-radius:14px;}
  .tbt-step-icon{
    width:32px; height:32px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#1B1F2A;
  }
  .tbt-step-icon svg{width:20px; height:20px;}
  .tbt-step-instr{font-size:14px; font-weight:600;}
  .tbt-step-dist{font-size:12.5px; color:#8b93a1; margin-top:2px;}
  .tbt-arrived{
    margin:16px 18px; padding:16px 20px; border-radius:18px; background:rgba(59,130,246,.1);
    color:#1B1F2A; font-weight:700; text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .sky{animation:none;}
    *{transition-duration:.01ms !important;}
  }
  @media (max-width:480px), (max-height:760px){
    .stage{width:100%; height:100vh; max-height:100vh;}
    .glow{display:none;}
    .phone{border-radius:0; box-shadow:none;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="glow" id="glow"></div>
  <div class="phone" id="phone">
    <div class="sky" id="sky"><div class="sun" id="sunGlow"></div></div>

    <!-- HOME -->
    <section class="view active" id="view-home">
      <div class="statusbar"><span id="clockHome">9:41</span><span>&nbsp;</span></div>
      <div class="home-content">
        <p class="eyebrow" id="greeting">GOOD MORNING</p>
        <h1 class="home-title">Two calm<br>tools, one sky.</h1>
        <p class="home-sub">Check the forecast or get where you're going — without the noise.</p>
        <div class="card-stack">
          <button class="app-card" data-target="weather">
            <span class="card-icon" id="homeWeatherIcon"></span>
            <span class="card-text">
              <span class="card-label">Weather</span>
              <span class="card-desc">Live forecast for your sky</span>
            </span>
            <span class="chevron">→</span>
          </button>
          <button class="app-card" data-target="nav">
            <span class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
            </span>
            <span class="card-text">
              <span class="card-label">Navigate</span>
              <span class="card-desc">Directions, calmly given</span>
            </span>
            <span class="chevron">→</span>
          </button>
        </div>
      </div>
    </section>

    <!-- WEATHER -->
    <section class="view" id="view-weather">
      <div class="subhead">
        <button class="icon-btn" id="weatherBack" aria-label="Back to home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="pill-toggle" id="unitToggle">
          <button data-unit="f" class="active">°F</button>
          <button data-unit="c">°C</button>
        </div>
      </div>
      <div class="scroll" id="weatherScroll">
        <div class="center-msg" id="weatherLoading">
          <div class="spinner"></div>
          <p class="msg-title" style="font-size:18px;">Finding your sky…</p>
          <p>Allow location access to see live conditions.</p>
        </div>
      </div>
    </section>

    <!-- NAVIGATE -->
    <section class="view" id="view-nav">
      <div id="map"></div>
      <button class="nav-back" id="navBack" aria-label="Back to home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="nav-top">
        <div class="nav-banner" id="navBanner"></div>
        <div class="nav-field">
          <div class="nav-search">
            <span class="dot" style="background:#3B82F6;"></span>
            <input id="originInput" type="text" placeholder="Your location" autocomplete="off">
          </div>
          <div class="suggest-list" id="originSuggest"></div>
        </div>
        <div class="nav-field">
          <div class="nav-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b93a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="destInput" type="text" placeholder="Search a destination" autocomplete="off">
            <button id="goBtn" aria-label="Get directions">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
          <div class="suggest-list" id="destSuggest"></div>
        </div>
      </div>
      <button class="locate-btn" id="locateBtn" aria-label="Use my location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
      <div class="nav-status" id="navStatus"></div>
      <div class="nav-sheet" id="navSheet">
        <div class="sheet-handle"></div>
        <p class="sheet-title" id="sheetTitle">Destination</p>
        <div class="sheet-stats">
          <span><b id="sheetDist">—</b> mi</span>
          <span><b id="sheetTime">—</b> min drive</span>
        </div>
        <div class="route-options" id="routeOptions"></div>
        <div class="sheet-actions">
          <button class="ghost" id="clearRoute">Clear</button>
          <button class="primary" id="startTbt">Turn-by-turn</button>
        </div>
      </div>

      <div class="tbt-overlay" id="tbtOverlay">
        <div class="tbt-header">
          <button class="tbt-close" id="tbtClose" aria-label="Close turn-by-turn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="tbt-summary"><b id="tbtDist">—</b> · <b id="tbtTime">—</b></div>
        </div>
        <div class="tbt-next" id="tbtNext">
          <span class="tbt-next-icon" id="tbtNextIcon"></span>
          <span>
            <div class="tbt-next-dist" id="tbtNextDist">—</div>
            <div class="tbt-next-instr" id="tbtNextInstr">—</div>
          </span>
        </div>
        <button class="tbt-start-btn" id="tbtStartBtn">Start Navigation</button>
        <div class="tbt-steps" id="tbtSteps"></div>
      </div>
    </section>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
(function(){
  "use strict";

  /* ---------------- ICONS ---------------- */
  const svgOpen = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  const ICONS = {
    clearDay: `<svg ${svgOpen}><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>`,
    clearNight: `<svg ${svgOpen}><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>`,
    partlyDay: `<svg ${svgOpen}><circle cx="8.5" cy="9.5" r="3.4"/><path d="M8.5 3.3v1.6M8.5 15.6v1.1M3.3 9.5h1.4M2.3 5.4l1.1 1.1M14.6 5.4l-1.1 1.1"/><path d="M11 20h6a3.5 3.5 0 0 0 .4-6.98A4.5 4.5 0 0 0 9 12"/></svg>`,
    partlyNight: `<svg ${svgOpen}><path d="M13.8 9.4A4.6 4.6 0 0 1 17.6 5a3.6 3.6 0 1 0 3.3 5.9 4.6 4.6 0 0 1-7.1-1.5z"/><path d="M11 20h6a3.5 3.5 0 0 0 .4-6.98A4.5 4.5 0 0 0 9 12"/></svg>`,
    cloudy: `<svg ${svgOpen}><path d="M7 18h10a4 4 0 0 0 .5-7.97A5.5 5.5 0 0 0 7 11.1 3.75 3.75 0 0 0 7 18z"/></svg>`,
    fog: `<svg ${svgOpen}><path d="M4 8h16M4 12h11M2 16h20M6 20h14"/></svg>`,
    drizzle: `<svg ${svgOpen}><path d="M7 15h9a3.7 3.7 0 0 0 .5-7.36A5.1 5.1 0 0 0 7 8.6 3.5 3.5 0 0 0 7 15z"/><path d="M9 18v2M13 18v2M17 18v2"/></svg>`,
    rain: `<svg ${svgOpen}><path d="M7 14h9a3.7 3.7 0 0 0 .5-7.36A5.1 5.1 0 0 0 7 7.6 3.5 3.5 0 0 0 7 14z"/><path d="M8 17l-1.5 3M12.5 17L11 20M17 17l-1.5 3"/></svg>`,
    snow: `<svg ${svgOpen}><path d="M7 13h9a3.7 3.7 0 0 0 .5-7.36A5.1 5.1 0 0 0 7 6.6 3.5 3.5 0 0 0 7 13z"/><path d="M8 17v4M6 19h4M15 17v4M13 19h4"/></svg>`,
    thunder: `<svg ${svgOpen}><path d="M7 13h9a3.7 3.7 0 0 0 .5-7.36A5.1 5.1 0 0 0 7 6.6 3.5 3.5 0 0 0 7 13z"/><path d="M13 15l-3 5h3l-2 4"/></svg>`,
    uv: `<svg ${svgOpen}><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>`,
    humidity: `<svg ${svgOpen}><path d="M12 3s6 7 6 11a6 6 0 0 1-12 0c0-4 6-11 6-11z"/></svg>`,
    wind: `<svg ${svgOpen}><path d="M3 8h10a2.5 2.5 0 1 0-2.4-3.2M3 12h14a2.5 2.5 0 1 1-2.4 3.2M3 16h8"/></svg>`,
    pressure: `<svg ${svgOpen}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>`,
    visibility: `<svg ${svgOpen}><path d="M2 12s4-6.5 10-6.5S22 12 22 12s-4 6.5-10 6.5S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg>`,
    dew: `<svg ${svgOpen}><path d="M12 3s5 6 5 9.5A5 5 0 0 1 7 12.5C7 9 12 3 12 3z"/></svg>`,
    aqi: `<svg ${svgOpen}><path d="M4 18c0-5 3-9 8-9s8 4 8 9"/><path d="M2 21h20"/></svg>`,
  };
  function weatherCategory(code){
    if([0,1].includes(code)) return 'clear';
    if(code===2) return 'partly';
    if(code===3) return 'cloudy';
    if([45,48].includes(code)) return 'fog';
    if([51,53,55,56,57].includes(code)) return 'drizzle';
    if([61,63,65,66,67,80,81,82].includes(code)) return 'rain';
    if([71,73,75,77,85,86].includes(code)) return 'snow';
    if([95,96,99].includes(code)) return 'thunder';
    return 'cloudy';
  }
  function weatherLabel(code){
    const map = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Rime fog',
      51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',56:'Freezing drizzle',57:'Freezing drizzle',
      61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Freezing rain',
      71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
      80:'Rain showers',81:'Rain showers',82:'Violent showers',85:'Snow showers',86:'Snow showers',
      95:'Thunderstorm',96:'Thunderstorm',99:'Severe thunderstorm'};
    return map[code] || 'Unsettled';
  }
  function iconFor(code, isDay){
    const cat = weatherCategory(code);
    if(cat==='clear') return isDay ? ICONS.clearDay : ICONS.clearNight;
    if(cat==='partly') return isDay ? ICONS.partlyDay : ICONS.partlyNight;
    if(cat==='cloudy') return ICONS.cloudy;
    if(cat==='fog') return ICONS.fog;
    if(cat==='drizzle') return ICONS.drizzle;
    if(cat==='rain') return ICONS.rain;
    if(cat==='snow') return ICONS.snow;
    if(cat==='thunder') return ICONS.thunder;
    return ICONS.cloudy;
  }

  /* ---------------- SKY / THEME ---------------- */
  const PRESETS = {
    dawn:   {stops:['#FFD9A6','#FF9E80','#7C6FA6'], light:false},
    dusk:   {stops:['#FF9E76','#C9678C','#423569'], light:false},
    dayClear:{stops:['#7EC8FF','#B9E3FF','#EAF6FF'], light:true},
    dayCloud:{stops:['#93A6B8','#C7D2D9','#E9EEF1'], light:true},
    daySnow:{stops:['#C7D6EA','#E4ECF6','#FFFFFF'], light:true},
    dayRain:{stops:['#5B6B82','#7C8CA0','#B7C1CC'], light:false},
    nightClear:{stops:['#0A0E27','#1B2452','#2C3868'], light:false},
    nightCloud:{stops:['#14161F','#22252F','#33363F'], light:false},
    nightRain:{stops:['#0E1320','#232A3B','#39415A'], light:false},
  };
  function applySky(name){
    const p = PRESETS[name] || PRESETS.dayClear;
    const root = document.documentElement;
    root.style.setProperty('--sky-1', p.stops[0]);
    root.style.setProperty('--sky-2', p.stops[1]);
    root.style.setProperty('--sky-3', p.stops[2]);
    if(p.light){
      root.style.setProperty('--text', '#1B1F2A');
      root.style.setProperty('--text-dim', 'rgba(27,31,42,.62)');
      root.style.setProperty('--glass', 'rgba(255,255,255,.45)');
      root.style.setProperty('--glass-border', 'rgba(255,255,255,.75)');
      root.style.setProperty('--glass-strong', 'rgba(255,255,255,.65)');
      root.style.setProperty('--scrim', 'rgba(255,255,255,0)');
    } else {
      root.style.setProperty('--text', '#FFFFFF');
      root.style.setProperty('--text-dim', 'rgba(255,255,255,.72)');
      root.style.setProperty('--glass', 'rgba(255,255,255,.14)');
      root.style.setProperty('--glass-border', 'rgba(255,255,255,.32)');
      root.style.setProperty('--glass-strong', 'rgba(255,255,255,.22)');
      root.style.setProperty('--scrim', 'rgba(0,0,0,.14)');
    }
  }
  function skyForHour(hour){ // fallback, no weather data yet
    if(hour>=5 && hour<7) return 'dawn';
    if(hour>=7 && hour<17) return 'dayClear';
    if(hour>=17 && hour<19.5) return 'dusk';
    return 'nightClear';
  }
  function skyForWeather(code, isDay, dawnDusk){
    const cat = weatherCategory(code);
    if(dawnDusk==='dawn') return 'dawn';
    if(dawnDusk==='dusk') return 'dusk';
    if(isDay){
      if(cat==='clear'||cat==='partly') return 'dayClear';
      if(cat==='snow') return 'daySnow';
      if(cat==='rain'||cat==='thunder'||cat==='drizzle') return 'dayRain';
      return 'dayCloud';
    } else {
      if(cat==='rain'||cat==='thunder'||cat==='drizzle') return 'nightRain';
      if(cat==='clear') return 'nightClear';
      return 'nightCloud';
    }
  }
  function positionSun(progress){ // 0..1 across the visible day for ambient glow
    const glow = document.getElementById('sunGlow');
    const x = 10 + progress*70;
    const y = 8 + Math.sin(progress*Math.PI) * -1 * 0 + (30 - Math.sin(progress*Math.PI)*22);
    glow.style.left = x+'%';
    glow.style.top = y+'%';
  }

  /* ---------------- VIEW ROUTING ---------------- */
  const views = {home:'view-home', weather:'view-weather', nav:'view-nav'};
  let mapInited = false;
  function showView(name){
    Object.values(views).forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById(views[name]).classList.add('active');
    if(name==='weather' && !weatherState.loaded && !weatherState.loading){ initWeather(); }
    if(name==='nav'){
      setTimeout(()=>{ if(!mapInited){ initMap(); mapInited = true; } else { map.invalidateSize(); } }, 30);
    }
  }
  document.querySelectorAll('.app-card').forEach(btn=>{
    btn.addEventListener('click', ()=> showView(btn.dataset.target));
  });
  document.getElementById('weatherBack').addEventListener('click', ()=> showView('home'));
  document.getElementById('navBack').addEventListener('click', ()=> showView('home'));

  /* ---------------- WEATHER STATE ---------------- */
  const weatherState = {loaded:false, loading:false, unit:'f', lat:null, lon:null, data:null, place:'Your Location'};
  // Default unit by locale
  try{
    if(!/en-US/i.test(navigator.language||'')) weatherState.unit = 'c';
  }catch(e){}

  /* ---------------- HOME GREETING / CLOCK ---------------- */
  function updateClockAndGreeting(){
    const now = new Date();
    const h = now.getHours();
    let greet = 'GOOD MORNING';
    if(h>=12 && h<17) greet='GOOD AFTERNOON';
    else if(h>=17 && h<21) greet='GOOD EVENING';
    else if(h>=21 || h<5) greet='GOOD NIGHT';
    document.getElementById('greeting').textContent = greet;
    const timeStr = now.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
    document.getElementById('clockHome').textContent = timeStr;
    if(!weatherState.loaded){
      applySky(skyForHour(h + now.getMinutes()/60));
    }
    document.getElementById('homeWeatherIcon').innerHTML = (h>=6.5 && h<19) ? ICONS.clearDay : ICONS.clearNight;
  }
  updateClockAndGreeting();
  setInterval(updateClockAndGreeting, 30000);

  document.getElementById('unitToggle').addEventListener('click', (e)=>{
    const b = e.target.closest('button'); if(!b) return;
    const unit = b.dataset.unit;
    if(unit===weatherState.unit) return;
    weatherState.unit = unit;
    document.querySelectorAll('#unitToggle button').forEach(x=>x.classList.toggle('active', x.dataset.unit===unit));
    if(weatherState.lat!=null) fetchWeather(weatherState.lat, weatherState.lon, weatherState.place);
  });
  document.querySelectorAll('#unitToggle button').forEach(x=>x.classList.toggle('active', x.dataset.unit===weatherState.unit));

  // Human-readable message for a GeolocationPositionError, since sandboxed
  // previews (like an in-chat artifact frame) commonly block geolocation
  // outright — code 1 fires immediately with no browser prompt at all.
  function geoErrorMessage(err){
    if(err && err.code === 1) return "This preview isn't allowed to ask for your location.";
    if(err && err.code === 2) return "Your location couldn't be determined.";
    if(err && err.code === 3) return "Finding your location took too long.";
    return "Couldn't get your location.";
  }

  function initWeather(){
    weatherState.loading = true;
    const scroll = document.getElementById('weatherScroll');
    scroll.innerHTML = `<div class="center-msg" id="weatherLoading"><div class="spinner"></div>
      <p class="msg-title" style="font-size:18px;">Finding your sky…</p>
      <p>Allow location access to see live conditions.</p></div>`;
    if(!navigator.geolocation){
      showWeatherManualSearch("Location isn't available in this browser.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        weatherState.lat = pos.coords.latitude;
        weatherState.lon = pos.coords.longitude;
        reverseGeocode(weatherState.lat, weatherState.lon).then(name=>{
          weatherState.place = name;
          fetchWeather(weatherState.lat, weatherState.lon, name);
        });
      },
      err => { showWeatherManualSearch(geoErrorMessage(err)); },
      {timeout:8000, maximumAge:300000}
    );
  }

  function showWeatherManualSearch(message){
    weatherState.loading = false;
    const scroll = document.getElementById('weatherScroll');
    scroll.innerHTML = `<div class="center-msg">
        <p class="msg-title" style="font-size:18px;">${message}</p>
        <p>Search for a city instead, or try again.</p>
        <div class="search-row"><input id="citySearch" type="text" placeholder="Try “Bridgeport, CT”"><div class="suggest-list" id="citySuggest"></div></div>
        <div style="display:flex; gap:10px;">
          <button class="btn" id="citySearchGo">Search</button>
          <button class="btn" id="tryLocationAgain">Use my location</button>
        </div>
        <p id="citySearchError" style="color:#B84B4B; font-size:12.5px; min-height:16px;"></p>
      </div>`;
    document.getElementById('tryLocationAgain').addEventListener('click', initWeather);
    let citySelected = null;
    const cityInput = document.getElementById('citySearch');
    attachAutocomplete(cityInput, document.getElementById('citySuggest'), sel=>{ citySelected = sel; }, ()=> go());
    const go = ()=>{
      const errEl = document.getElementById('citySearchError');
      if(citySelected){
        weatherState.lat = citySelected.lat; weatherState.lon = citySelected.lon; weatherState.place = citySelected.short;
        fetchWeather(citySelected.lat, citySelected.lon, citySelected.short);
        return;
      }
      const q = cityInput.value.trim();
      if(!q) return;
      errEl.textContent = 'Searching…';
      geocodeCity(q).then(res=>{
        if(!res){ if(errEl) errEl.textContent = "Couldn't find that place. Try picking a suggestion, or add a state/country."; return; }
        weatherState.lat = res.lat; weatherState.lon = res.lon; weatherState.place = res.name;
        fetchWeather(res.lat, res.lon, res.name);
      }).catch(()=>{ if(errEl) errEl.textContent = 'Search failed — check your connection and try again.'; });
    };
    document.getElementById('citySearchGo').addEventListener('click', go);
  }

  async function reverseGeocode(lat, lon){
    try{
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
      const j = await r.json();
      const a = j.address || {};
      return a.city || a.town || a.village || a.county || a.state || 'Your Location';
    }catch(e){ return 'Your Location'; }
  }
  // Open-Meteo's own geocoder: reliable CORS, no key, no user-agent policy —
  // used instead of Nominatim search, which can be rate-limited or blocked
  // from sandboxed origins.
  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Looks up up to `count` candidate places for a query, trying Open-Meteo's
  // geocoder first and falling back to Nominatim if that host is unreachable.
  // If the full query (e.g. "Vienna, Virginia") returns nothing, it retries
  // with just the part before the comma so ambiguous names still surface
  // real candidates — the caller picks the right one from a dropdown rather
  // than silently getting the most-populous match worldwide.
  async function fetchPlaces(query, count){
    try{
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=${count}&language=en&format=json`);
      if(r.ok){
        const j = await r.json();
        const results = (j.results||[]).map(res=>{
          const parts = [res.name, res.admin1, res.country].filter(Boolean);
          return {lat:res.latitude, lon:res.longitude, label:parts.join(', '), short:parts.slice(0,2).join(', '), full:parts.join(', ')};
        });
        return {results, error:null};
      }
    }catch(e){ /* fall through to Nominatim */ }
    try{
      const r2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=${count}`);
      if(!r2.ok) throw new Error('nominatim request failed');
      const j2 = await r2.json();
      const results = j2.map(item=>{
        const bits = item.display_name.split(',').map(s=>s.trim());
        return {lat:parseFloat(item.lat), lon:parseFloat(item.lon), label:bits.slice(0,3).join(', '), short:bits.slice(0,2).join(', '), full:bits.join(', ')};
      });
      return {results, error:null};
    }catch(e){
      return {results:[], error:'unreachable'};
    }
  }
  async function searchPlaces(query, count=6){
    let out = await fetchPlaces(query, count);
    if(out.results.length===0 && !out.error && query.includes(',')){
      const shortQ = query.split(',')[0].trim();
      if(shortQ) out = await fetchPlaces(shortQ, count);
    }
    return out;
  }
  async function geocodeCity(q){
    const {results, error} = await searchPlaces(q, 1);
    if(error) throw new Error('geocoding unavailable');
    return results.length ? {lat:results[0].lat, lon:results[0].lon, name:results[0].short} : null;
  }

  // Wires a text input to a live dropdown of place suggestions. onSelect is
  // called with the chosen place object, or null whenever the person edits
  // the text (so a stale selection can't silently be used for routing).
  function attachAutocomplete(inputEl, listEl, onSelect, onSubmit){
    let debounceTimer = null, reqId = 0, lastResults = [], highlighted = -1;
    function hide(){ listEl.classList.remove('show'); highlighted = -1; }
    function highlight(i){
      listEl.querySelectorAll('.suggest-item').forEach((el,idx)=> el.classList.toggle('hi', idx===i));
      highlighted = i;
    }
    function pick(r){
      inputEl.value = r.short;
      hide();
      onSelect(r);
    }
    function render(results, thisReq){
      if(thisReq !== reqId) return; // a newer keystroke already superseded this response
      lastResults = results;
      if(!results.length){
        listEl.innerHTML = `<div class="suggest-empty">No matches yet — try a different spelling.</div>`;
        listEl.classList.add('show');
        return;
      }
      listEl.innerHTML = results.map((r,i)=>{
        const bits = r.short.split(',');
        const main = escapeHtml((bits.shift()||'').trim());
        const sub = escapeHtml(bits.join(',').trim());
        return `<button type="button" class="suggest-item" data-idx="${i}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>
            <span><span class="s-main">${main}</span><span class="s-sub">${sub}</span></span>
          </button>`;
      }).join('');
      listEl.classList.add('show');
      listEl.querySelectorAll('.suggest-item').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          pick(results[parseInt(btn.dataset.idx, 10)]);
          if(onSubmit) onSubmit();
        });
      });
    }
    // A tap on the dropdown would otherwise blur the input first (hiding the
    // list before its click fires), which is what let stale/ambiguous text
    // slip through instead of the tapped suggestion. Blocking mousedown's
    // default action keeps focus in place so the click always lands.
    listEl.addEventListener('mousedown', e=> e.preventDefault());
    inputEl.addEventListener('input', ()=>{
      onSelect(null);
      const q = inputEl.value.trim();
      clearTimeout(debounceTimer);
      if(q.length < 2){ hide(); return; }
      debounceTimer = setTimeout(async ()=>{
        const myReq = ++reqId;
        const {results} = await searchPlaces(q, 6);
        render(results, myReq);
      }, 300);
    });
    inputEl.addEventListener('keydown', e=>{
      if(e.key === 'ArrowDown' && listEl.classList.contains('show')){ e.preventDefault(); highlight(Math.min(highlighted+1, lastResults.length-1)); return; }
      if(e.key === 'ArrowUp' && listEl.classList.contains('show')){ e.preventDefault(); highlight(Math.max(highlighted-1, 0)); return; }
      if(e.key === 'Escape'){ hide(); return; }
      if(e.key === 'Enter'){
        e.preventDefault();
        // Enter with an open list commits the highlighted (or top) match
        // instead of whatever ambiguous text was typed.
        if(listEl.classList.contains('show') && lastResults.length){
          pick(lastResults[highlighted >= 0 ? highlighted : 0]);
        } else {
          hide();
        }
        if(onSubmit) onSubmit();
      }
    });
    inputEl.addEventListener('focus', ()=>{ if(listEl.innerHTML) listEl.classList.add('show'); });
    inputEl.addEventListener('blur', ()=> setTimeout(hide, 150)); // let a click register first
  }

  function cToF(c){ return c*9/5+32; }
  function fmtTemp(c){ const v = weatherState.unit==='f' ? cToF(c) : c; return Math.round(v); }
  function unitSuffix(){ return weatherState.unit==='f' ? '°' : '°'; }
  function windUnit(kmh){ return weatherState.unit==='f' ? Math.round(kmh*0.621371) : Math.round(kmh); }
  function windUnitLabel(){ return weatherState.unit==='f' ? 'mph' : 'km/h'; }
  function visUnit(m){ return weatherState.unit==='f' ? (m/1609.34).toFixed(1) : (m/1000).toFixed(1); }
  function visUnitLabel(){ return weatherState.unit==='f' ? 'mi' : 'km'; }
  function pressureUnit(hpa){ return weatherState.unit==='f' ? (hpa*0.02953).toFixed(2) : Math.round(hpa); }
  function pressureUnitLabel(){ return weatherState.unit==='f' ? 'inHg' : 'hPa'; }
  function compass(deg){
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg/22.5)%16];
  }
  function aqiCategory(v){
    if(v==null) return {label:'—', note:''};
    if(v<=50) return {label:'Good', note:'Air quality is satisfactory.'};
    if(v<=100) return {label:'Moderate', note:'Acceptable for most people.'};
    if(v<=150) return {label:'Sensitive', note:'Sensitive groups take care.'};
    if(v<=200) return {label:'Unhealthy', note:'Everyone may feel effects.'};
    if(v<=300) return {label:'Very Unhealthy', note:'Health alert.'};
    return {label:'Hazardous', note:'Serious health risk.'};
  }

  async function fetchWeather(lat, lon, placeName){
    weatherState.loading = true;
    try{
      const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,is_day`+
        `&hourly=temperature_2m,weather_code,precipitation_probability,uv_index,visibility,dew_point_2m`+
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max`+
        `&timezone=auto&forecast_days=8`;
      const aqUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi&timezone=auto`;

      const [wRes, aqRes] = await Promise.all([
        fetch(wUrl),
        fetch(aqUrl).catch(()=>null)
      ]);
      const w = await wRes.json();
      let aqi = null;
      if(aqRes){ try{ const aq = await aqRes.json(); aqi = aq.current ? aq.current.us_aqi : null; }catch(e){} }

      weatherState.data = w;
      weatherState.aqi = aqi;
      weatherState.loaded = true;
      weatherState.loading = false;
      renderWeather(w, placeName, aqi);
    }catch(e){
      showWeatherManualSearch("Couldn't load the forecast.");
    }
  }

  function renderWeather(w, placeName, aqi){
    const cur = w.current;
    const daily = w.daily;
    const hourly = w.hourly;
    const isDay = cur.is_day === 1;

    // dawn/dusk window detection
    const now = new Date(cur.time);
    const sunrise = new Date(daily.sunrise[0]);
    const sunset = new Date(daily.sunset[0]);
    let dawnDusk = null;
    if(Math.abs(now - sunrise) < 55*60000) dawnDusk = 'dawn';
    if(Math.abs(now - sunset) < 55*60000) dawnDusk = 'dusk';
    applySky(skyForWeather(cur.weather_code, isDay, dawnDusk));
    const dayProgress = Math.min(1, Math.max(0, (now - sunrise)/(sunset - sunrise)));
    positionSun(isDay ? dayProgress : (now.getHours()>12?0.85:0.1));

    // find current hour index in hourly arrays
    const nowKey = cur.time.slice(0,13);
    let hIdx = hourly.time.findIndex(t=>t.slice(0,13)===nowKey);
    if(hIdx<0) hIdx = 0;

    const dewC = hourly.dew_point_2m[hIdx];
    const visM = hourly.visibility[hIdx];
    const uv = hourly.uv_index[hIdx] != null ? hourly.uv_index[hIdx] : daily.uv_index_max[0];

    const aq = aqiCategory(aqi);

    // hourly strip: next 24 hours starting at current index
    let hourlyHtml = '';
    for(let i=hIdx; i<Math.min(hIdx+24, hourly.time.length); i++){
      const t = new Date(hourly.time[i]);
      const label = i===hIdx ? 'Now' : t.toLocaleTimeString([], {hour:'numeric'});
      const hIsDay = (t.getHours()>=6 && t.getHours()<20) ? 1 : 0;
      hourlyHtml += `<div class="hour-item">
          <span class="h-time">${label}</span>
          ${iconFor(hourly.weather_code[i], hIsDay)}
          <span class="h-temp">${fmtTemp(hourly.temperature_2m[i])}°</span>
        </div>`;
    }

    // daily list
    const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const allHi = daily.temperature_2m_max.map(fmtTemp);
    const allLo = daily.temperature_2m_min.map(fmtTemp);
    const globalMax = Math.max(...allHi), globalMin = Math.min(...allLo);
    let dailyHtml = '';
    for(let i=0;i<daily.time.length;i++){
      const d = new Date(daily.time[i]+'T12:00:00');
      const label = i===0 ? 'Today' : dayLabels[d.getDay()];
      const hi = allHi[i], lo = allLo[i];
      const left = ((lo-globalMin)/(globalMax-globalMin+0.0001))*100;
      const width = ((hi-lo)/(globalMax-globalMin+0.0001))*100;
      dailyHtml += `<div class="day-row">
          <span class="day-name">${label}</span>
          ${iconFor(daily.weather_code[i], 1)}
          <div class="day-bar-wrap">
            <span class="day-lo">${lo}°</span>
            <div class="day-bar"><i style="left:${left}%; width:${Math.max(width,6)}%"></i></div>
            <span class="day-hi">${hi}°</span>
          </div>
        </div>`;
    }

    // sunrise/sunset arc
    const arcProgress = Math.min(1, Math.max(0, dayProgress));
    const arcAngle = Math.PI * (1 - arcProgress);
    const cx = 90, cy = 70, r = 66;
    const sunX = cx + r*Math.cos(arcAngle);
    const sunY = cy - r*Math.sin(arcAngle) * (isDay?1:0.0) ;
    const dotY = isDay ? (cy - r*Math.sin(arcAngle)) : cy;
    const arcSvg = `<svg viewBox="0 0 180 90" width="180" height="90">
        <path d="M 24 70 A 66 66 0 0 1 156 70" fill="none" stroke="currentColor" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round"/>
        ${isDay ? `<circle cx="${sunX.toFixed(1)}" cy="${dotY.toFixed(1)}" r="6" fill="currentColor"/>` : ''}
      </svg>`;

    const html = `
      <p class="loc-name">${placeName}</p>
      <p class="loc-date">${now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})}</p>
      <div class="now-icon">${iconFor(cur.weather_code, isDay)}</div>
      <p class="now-temp">${fmtTemp(cur.temperature_2m)}°</p>
      <p class="now-cond">${weatherLabel(cur.weather_code)}</p>
      <p class="now-range">Feels like ${fmtTemp(cur.apparent_temperature)}° · H:${allHi[0]}° L:${allLo[0]}°</p>

      <p class="section-label">Hourly</p>
      <div class="glass-card"><div class="hourly-strip">${hourlyHtml}</div></div>

      <p class="section-label">8-Day Forecast</p>
      <div class="glass-card daily-list">${dailyHtml}</div>

      <p class="section-label">Sun</p>
      <div class="glass-card arc-card">
        ${arcSvg}
        <div class="arc-times">
          <span>Sunrise<br><b>${sunrise.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</b></span>
          <span style="text-align:right;">Sunset<br><b>${sunset.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</b></span>
        </div>
      </div>

      <p class="section-label">Conditions</p>
      <div class="detail-grid">
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.uv} UV Index</span><span class="detail-value">${Math.round(uv)}</span><span class="detail-note">${uv<3?'Low':uv<6?'Moderate':uv<8?'High':'Very high'}</span></div>
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.humidity} Humidity</span><span class="detail-value">${cur.relative_humidity_2m}%</span><span class="detail-note">Dew point ${fmtTemp(dewC)}°</span></div>
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.wind} Wind</span><span class="detail-value">${windUnit(cur.wind_speed_10m)} <span style="font-size:15px;">${windUnitLabel()}</span></span><span class="detail-note">${compass(cur.wind_direction_10m)}</span></div>
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.pressure} Pressure</span><span class="detail-value">${pressureUnit(cur.surface_pressure)}</span><span class="detail-note">${pressureUnitLabel()}</span></div>
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.visibility} Visibility</span><span class="detail-value">${visUnit(visM)} <span style="font-size:15px;">${visUnitLabel()}</span></span><span class="detail-note">${visM>8000?'Clear conditions':'Reduced'}</span></div>
        <div class="glass-card detail-card"><span class="detail-top">${ICONS.aqi} Air Quality</span><span class="detail-value">${aqi!=null?aqi:'—'}</span><span class="detail-note">${aq.label}${aqi!=null?'':' (unavailable)'}</span></div>
      </div>
      <p class="credit">Weather data by Open‑Meteo</p>
    `;
    document.getElementById('weatherScroll').innerHTML = html;
  }

  /* ---------------- NAVIGATE ---------------- */
  let map, userMarker, destMarker, routeLines = [], routesData = [], selectedRouteIdx = 0;
  let originSelected = null, destSelected = null;
  const DEFAULT_CENTER = [41.1865, -73.1952]; // Bridgeport, CT fallback

  function pulseDivIcon(color){
    return L.divIcon({
      className:'', html:`<div style="width:16px;height:16px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 0 0 4px ${color}33, 0 4px 10px rgba(0,0,0,.3);"></div>`,
      iconSize:[16,16], iconAnchor:[8,8]
    });
  }
  function pinDivIcon(color){
    return L.divIcon({
      className:'', html:`<svg width="30" height="40" viewBox="0 0 30 40"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 25 15 25s15-14.5 15-25C30 6.7 23.3 0 15 0z" fill="${color}"/><circle cx="15" cy="15" r="6" fill="#fff"/></svg>`,
      iconSize:[30,40], iconAnchor:[15,40]
    });
  }

  function showNavBanner(html){
    const el = document.getElementById('navBanner');
    if(!html){ el.classList.remove('show'); el.innerHTML=''; return; }
    el.innerHTML = html;
    el.classList.add('show');
  }

  function initMap(){
    map = L.map('map', {zoomControl:false, attributionControl:true}).setView(DEFAULT_CENTER, 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:19, attribution:'© OpenStreetMap contributors'
    }).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    locateUser({silentFail:true});

    attachAutocomplete(document.getElementById('originInput'), document.getElementById('originSuggest'), sel=>{ originSelected = sel; }, ()=> routeTo());
    attachAutocomplete(document.getElementById('destInput'), document.getElementById('destSuggest'), sel=>{ destSelected = sel; }, ()=> routeTo());
  }

  // Wrapped so both initMap() and the locate button reuse the same logic
  // and the same clear messaging when the sandboxed preview blocks access.
  function locateUser({silentFail=false} = {}){
    if(!navigator.geolocation){
      setNavStatus('');
      showNavBanner('Geolocation isn\'t supported here. Type a starting point in "Your location" below.');
      return;
    }
    setNavStatus('Locating you…');
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const ll = [pos.coords.latitude, pos.coords.longitude];
        map.setView(ll, 14);
        if(userMarker) map.removeLayer(userMarker);
        userMarker = L.marker(ll, {icon:pulseDivIcon('#3B82F6')}).addTo(map);
        setNavStatus('');
        showNavBanner('');
      },
      err=>{
        setNavStatus('');
        const msg = geoErrorMessage(err);
        showNavBanner(`${msg} You can still type a starting point in "Your location" and a destination below.
          <button id="navRetryLocate">Try again</button>`);
        const retry = document.getElementById('navRetryLocate');
        if(retry) retry.addEventListener('click', ()=> locateUser());
        if(!silentFail){ /* banner already shown */ }
      },
      {timeout:8000}
    );
  }

  function setNavStatus(msg){
    const el = document.getElementById('navStatus');
    if(!msg){ el.style.display='none'; el.textContent=''; return; }
    el.style.display='block';
    el.textContent = msg;
  }

  document.getElementById('locateBtn').addEventListener('click', ()=> locateUser());

  function haversineMiles(lat1, lon1, lat2, lon2){
    const R = 3958.8, toRad = d=>d*Math.PI/180;
    const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return R * 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // Prefers an explicit dropdown pick over a freeform-text geocode, since a
  // typed name alone (e.g. "Vienna") is ambiguous worldwide.
  async function resolveOrigin(){
    if(originSelected) return {lat:originSelected.lat, lon:originSelected.lon, name:originSelected.short};
    const typed = document.getElementById('originInput').value.trim();
    if(typed){
      const res = await geocodeCity(typed);
      if(res) return {lat:res.lat, lon:res.lon, name:res.name};
      throw new Error('origin-not-found');
    }
    if(userMarker){ const ll = userMarker.getLatLng(); return {lat:ll.lat, lon:ll.lng, name:'Your location'}; }
    return {lat:DEFAULT_CENTER[0], lon:DEFAULT_CENTER[1], name:'Default location'};
  }
  async function resolveDestination(){
    if(destSelected) return {lat:destSelected.lat, lon:destSelected.lon, name:destSelected.short};
    const typed = document.getElementById('destInput').value.trim();
    if(!typed) return null;
    return await geocodeCity(typed);
  }

  function clearRouteLines(){
    routeLines.forEach(l=> map.removeLayer(l));
    routeLines = [];
  }

  // Draws every candidate route, highlighting whichever is selected; taps
  // on a non-selected line (or its chip) switch which one is highlighted.
  function renderRoutes(){
    clearRouteLines();
    routesData.forEach((r, i)=>{
      const isSel = i === selectedRouteIdx;
      const latlngs = r.geometry.coordinates.map(c=>[c[1], c[0]]);
      const line = L.polyline(latlngs, {
        color: isSel ? '#3B82F6' : '#9AA5B1',
        weight: isSel ? 6 : 4,
        opacity: isSel ? 0.95 : 0.6,
        dashArray: isSel ? null : '1 9',
        lineJoin: 'round'
      }).addTo(map);
      line.on('click', ()=> selectRoute(i));
      routeLines.push(line);
    });
    if(routeLines[selectedRouteIdx]) routeLines[selectedRouteIdx].bringToFront();
  }

  function selectRoute(i){
    selectedRouteIdx = i;
    renderRoutes();
    const r = routesData[i];
    document.getElementById('sheetDist').textContent = (r.distance/1609.34).toFixed(1);
    document.getElementById('sheetTime').textContent = Math.round(r.duration/60);
    renderRouteChips();
  }

  function renderRouteChips(){
    const wrap = document.getElementById('routeOptions');
    if(routesData.length <= 1){ wrap.innerHTML = ''; return; }
    const ranked = routesData.map((r,i)=>({r,i})).sort((a,b)=> a.r.duration - b.r.duration);
    wrap.innerHTML = ranked.map(({r,i}, rank)=>{
      const mins = Math.round(r.duration/60);
      const mi = (r.distance/1609.34).toFixed(1);
      const label = rank===0 ? 'Fastest' : `Route ${rank+1}`;
      return `<button type="button" class="route-chip ${i===selectedRouteIdx?'active':''}" data-idx="${i}">${label}<span>${mins} min · ${mi} mi</span></button>`;
    }).join('');
    wrap.querySelectorAll('.route-chip').forEach(btn=>{
      btn.addEventListener('click', ()=> selectRoute(parseInt(btn.dataset.idx, 10)));
    });
  }

  async function routeTo(){
    showNavBanner('');
    setNavStatus('Finding your starting point…');
    let origin, dest;
    try{
      origin = await resolveOrigin();
    }catch(e){
      setNavStatus('');
      showNavBanner('Couldn\'t find that starting point. Pick a suggestion, or leave it blank to use your current location.');
      return;
    }

    setNavStatus('Searching…');
    try{
      dest = await resolveDestination();
    }catch(e){
      dest = null;
    }
    if(!dest){ setNavStatus(''); showNavBanner('No results for that destination. Pick a suggestion, or add a state/country.'); return; }

    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([origin.lat, origin.lon], {icon:pulseDivIcon('#3B82F6')}).addTo(map);
    if(destMarker) map.removeLayer(destMarker);
    destMarker = L.marker([dest.lat, dest.lon], {icon:pinDivIcon('#E24A4A')}).addTo(map);

    setNavStatus('Getting directions…');
    routesData = [];
    selectedRouteIdx = 0;
    try{
      const rUrl = `https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${dest.lon},${dest.lat}?overview=full&geometries=geojson&alternatives=true&steps=true`;
      const rr = await fetch(rUrl);
      if(rr.ok){
        const rj = await rr.json();
        if(rj.routes && rj.routes.length) routesData = rj.routes;
      }
    }catch(e){ /* fall through to straight-line fallback below */ }

    clearRouteLines();

    if(routesData.length){
      renderRoutes();
      renderRouteChips();
      const bounds = routeLines[selectedRouteIdx].getBounds();
      map.fitBounds(bounds, {padding:[60,60]});
      document.getElementById('sheetDist').textContent = (routesData[0].distance/1609.34).toFixed(1);
      document.getElementById('sheetTime').textContent = Math.round(routesData[0].duration/60);
      showNavBanner('');
    } else {
      // Live routing unavailable — fall back to a direct line so the
      // feature still gives useful distance/direction information.
      const line = L.polyline([[origin.lat, origin.lon],[dest.lat, dest.lon]], {
        color:'#3B82F6', weight:4, opacity:.85, dashArray:'2 10', lineCap:'round'
      }).addTo(map);
      routeLines = [line];
      map.fitBounds(line.getBounds(), {padding:[60,60]});
      const miles = haversineMiles(origin.lat, origin.lon, dest.lat, dest.lon);
      document.getElementById('sheetDist').textContent = miles.toFixed(1) + ' (direct)';
      document.getElementById('sheetTime').textContent = '—';
      document.getElementById('routeOptions').innerHTML = '';
      showNavBanner('Live driving directions aren\'t reachable from this preview, so this shows a direct line and straight-line distance instead.');
    }

    document.getElementById('sheetTitle').textContent = dest.name;
    document.getElementById('navSheet').classList.add('show');
    setNavStatus('');
  }
  document.getElementById('goBtn').addEventListener('click', routeTo);

  /* ---------------- IN-APP TURN-BY-TURN ---------------- */
  let tbtSteps = [], tbtCurrentIdx = 0, tbtWatchId = null;

  function formatDist(m){
    if(m == null) return '';
    const miles = m/1609.34;
    if(miles < 0.1) return Math.max(0, Math.round(m*3.28084)) + ' ft';
    return miles.toFixed(1) + ' mi';
  }
  function maneuverIcon(type, modifier){
    if(type === 'arrive'){
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>`;
    }
    if(type === 'depart'){
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/></svg>`;
    }
    if(['roundabout','rotary','roundabout turn','exit roundabout','exit rotary'].includes(type)){
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><path d="M12 5v4M12 5l-2.4 2.4"/></svg>`;
    }
    const angles = {'sharp right':120,'right':90,'slight right':45,'straight':0,'slight left':-45,'left':-90,'sharp left':-120,'uturn':180};
    const angle = angles[modifier] != null ? angles[modifier] : 0;
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(${angle}deg)"><path d="M12 19V5M12 5l-6 6M12 5l6 6"/></svg>`;
  }
  function describeStep(s){
    const name = s.name ? ` onto ${s.name}` : '';
    const t = s.maneuver.type, m = s.maneuver.modifier;
    if(t === 'depart') return `Head out${name}`.trim();
    if(t === 'arrive') return 'Arrive at your destination';
    if(t === 'roundabout' || t === 'rotary') return `Enter the roundabout${s.maneuver.exit ? ', take exit '+s.maneuver.exit : ''}${name}`;
    if(t === 'merge') return `Merge${m ? ' '+m : ''}${name}`;
    if(t === 'fork') return `Keep ${m || 'straight'}${name}`;
    if(t === 'end of road') return `Turn ${m || ''}${name}`.trim();
    if(t === 'continue' || t === 'new name') return `Continue${name}`;
    if(t === 'on ramp') return `Take the ramp${name}`;
    if(t === 'off ramp') return `Take the exit${name}`;
    const mod = m || 'straight';
    if(mod === 'straight') return `Continue straight${name}`;
    if(mod === 'uturn') return `Make a U-turn${name}`;
    const verb = mod.includes('sharp') ? 'Sharp turn' : mod.includes('slight') ? 'Slight turn' : `Turn ${mod}`;
    return `${verb}${name}`;
  }
  function renderTbtSteps(){
    document.getElementById('tbtSteps').innerHTML = tbtSteps.map((s,i)=>`
      <div class="tbt-step ${i===tbtCurrentIdx?'active':''}" data-i="${i}">
        <span class="tbt-step-icon">${maneuverIcon(s.maneuver.type, s.maneuver.modifier)}</span>
        <div><div class="tbt-step-instr">${escapeHtml(describeStep(s))}</div><div class="tbt-step-dist">${formatDist(s.distance)}</div></div>
      </div>`).join('');
  }
  function updateTbtNext(){
    const s = tbtSteps[tbtCurrentIdx];
    if(!s) return;
    document.getElementById('tbtNextIcon').innerHTML = maneuverIcon(s.maneuver.type, s.maneuver.modifier);
    document.getElementById('tbtNextInstr').textContent = describeStep(s);
    document.getElementById('tbtNextDist').textContent = formatDist(s.distance) || 'Now';
  }
  function openTurnByTurn(){
    const route = routesData[selectedRouteIdx];
    if(!route || !route.legs || !route.legs.length){
      showNavBanner('Turn-by-turn needs live routing, which wasn\'t available for this trip.');
      return;
    }
    tbtSteps = [].concat(...route.legs.map(l=> l.steps || []));
    tbtCurrentIdx = 0;
    document.getElementById('tbtDist').textContent = (route.distance/1609.34).toFixed(1) + ' mi';
    document.getElementById('tbtTime').textContent = Math.round(route.duration/60) + ' min';
    renderTbtSteps();
    updateTbtNext();
    document.getElementById('tbtOverlay').classList.add('show');
  }
  function stopTbtNav(){
    if(tbtWatchId != null){ navigator.geolocation.clearWatch(tbtWatchId); tbtWatchId = null; }
    const btn = document.getElementById('tbtStartBtn');
    btn.textContent = 'Start Navigation';
    btn.classList.remove('active');
  }
  function closeTbt(){
    document.getElementById('tbtOverlay').classList.remove('show');
    stopTbtNav();
  }
  function startTbtNav(){
    if(!navigator.geolocation){ showNavBanner("Geolocation isn't supported here."); return; }
    const btn = document.getElementById('tbtStartBtn');
    btn.textContent = 'Stop Navigation';
    btn.classList.add('active');
    tbtWatchId = navigator.geolocation.watchPosition(
      pos=>{
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        if(userMarker) userMarker.setLatLng([lat, lon]); else userMarker = L.marker([lat, lon], {icon:pulseDivIcon('#3B82F6')}).addTo(map);
        map.panTo([lat, lon]);
        // Advance to the next instruction once we're close to its maneuver point.
        let s = tbtSteps[tbtCurrentIdx];
        while(s && s.maneuver && s.maneuver.location && tbtCurrentIdx < tbtSteps.length - 1){
          const [mlon, mlat] = s.maneuver.location;
          const distM = haversineMiles(lat, lon, mlat, mlon) * 1609.34;
          if(distM < 35){ tbtCurrentIdx++; s = tbtSteps[tbtCurrentIdx]; renderTbtSteps(); }
          else break;
        }
        updateTbtNext();
      },
      err=> showNavBanner(geoErrorMessage(err)),
      {enableHighAccuracy:true, maximumAge:2000, timeout:10000}
    );
  }
  document.getElementById('startTbt').addEventListener('click', openTurnByTurn);
  document.getElementById('tbtClose').addEventListener('click', closeTbt);
  document.getElementById('tbtStartBtn').addEventListener('click', ()=>{
    if(tbtWatchId != null) stopTbtNav(); else startTbtNav();
  });

  document.getElementById('clearRoute').addEventListener('click', ()=>{
    clearRouteLines();
    routesData = []; selectedRouteIdx = 0;
    if(destMarker){ map.removeLayer(destMarker); destMarker=null; }
    document.getElementById('navSheet').classList.remove('show');
    document.getElementById('routeOptions').innerHTML = '';
    document.getElementById('destInput').value=''; destSelected = null;
    showNavBanner('');
    closeTbt();
  });

})();
</script>
</body>
</html>
